// Generated by Bubblewrap from rajeshrajesh/twa-manifest.json
// DO NOT EDIT MANUALLY — re-run `bubblewrap update` after changing twa-manifest.json.

apply plugin: 'com.android.application'

android {
    compileSdkVersion 34
    namespace "app.lovable.meowmeow.twa"

    defaultConfig {
        applicationId "app.lovable.meowmeow.twa"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        // Pass values to AndroidManifest.xml from twa-manifest.json
        manifestPlaceholders = [
            hostName        : "meow-meow.co.in",
            defaultUrl      : "https://meow-meow.co.in/",
            launcherName    : "MeowMeow",
            assetStatements : '[{ "relation": ["delegate_permission/common.handle_all_urls"], ' +
                              '"target": {"namespace": "web", "site": "https://meow-meow.co.in"}}]'
        ]

        resValue "color", "colorPrimary",         "#1aa39b"
        resValue "color", "colorPrimaryDark",     "#0a0d14"
        resValue "color", "navigationColor",      "#0a0d14"
        resValue "color", "navigationColorDark",  "#0a0d14"
        resValue "color", "backgroundColor",      "#0a0d14"
    }

    signingConfigs {
        release {
            // Set via gradle.properties or env vars at build time:
            //   ORG_GRADLE_PROJECT_KEYSTORE_PATH=../../android.keystore
            //   ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD=...
            //   ORG_GRADLE_PROJECT_KEY_ALIAS=android
            //   ORG_GRADLE_PROJECT_KEY_PASSWORD=...
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "../../android.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEY_ALIAS") ?: "android"
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Google's official TWA support library
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
    implementation 'com.google.androidbrowserhelper:locationdelegation:1.1.1'
}
