    <!-- 
      Font Loading Strategy: On-Demand
      
      Only the base Latin font is preloaded. All other scripts (900+ languages)
      are loaded dynamically when text in that script is detected.
      This dramatically improves initial page load performance.
      
      See: src/lib/fonts/font-loader.ts for the dynamic loading system.
    -->
    
    <!-- Preload base Latin fonts + Quicksand/Inter for non-blocking render -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" /></noscript>

    <!-- Fix 7/8: Prevent FOUC for BOTH light and dark users -->
    <script>
      (function(){
        var stored = localStorage.getItem("theme");
        var dark;
        if (stored === "dark" || stored === "light") {
          dark = stored === "dark";
        } else {
          dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        }
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.background = dark ? "#0a0d14" : "#f5f7fa";
        // Fix 8: Update theme-color meta tags dynamically
        var metas = document.querySelectorAll('meta[name="theme-color"]');
        var color = dark ? "#0a0d14" : "#f5f7fa";
        for (var i = 0; i < metas.length; i++) metas[i].setAttribute("content", color);
      })();
    </script>

    <style>
      /* Safe area padding for notched devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --keyboard-height: 0px;
      }
      
      /* Instant render - no FOUC */
      html { visibility: visible; opacity: 1; }
      
      /* Critical CSS for instant paint */
      body {
        margin: 0;
        background: #0a0d14;
        min-height: 100vh;
        min-height: 100dvh;

      }
    </style>

    <!-- Cache recovery: clear stale service workers on genuine load failures only -->
    <script>
      (function() {
        var APP_MOUNTED_ATTR = 'data-app-mounted';
        var isAndroid = /Android/i.test(navigator.userAgent);
        var timeout = isAndroid ? 20000 : 25000;

        function isMounted() {
          return document.documentElement.getAttribute(APP_MOUNTED_ATTR) === 'true';
        }

        if (isAndroid && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) {
              if (r.active) r.update();
            });
          });
        }

        var timer = setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || isMounted()) return;

          if (navigator.connection && navigator.connection.effectiveType
              && navigator.connection.effectiveType.includes('2g')) {
            return;
          }

          var recoveryKey = 'sw-recovery';
          var attempts = parseInt(sessionStorage.getItem(recoveryKey) || '0', 10);
          if (attempts >= 1) {
            root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0d14;color:#fff;font-family:sans-serif;padding:20px;text-align:center"><div><h1 style="font-size:20px;margin-bottom:12px">Loading failed</h1><p style="color:#888;margin-bottom:20px;font-size:14px">The app could not load. This is usually caused by a stale cache or an older Android browser.</p><button onclick="(async function(){if(\'serviceWorker\' in navigator){var r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(function(r){return r.unregister()}))}if(\'caches\' in window){var k=await caches.keys();await Promise.all(k.map(function(k){return caches.delete(k)}))}sessionStorage.clear();location.reload()})()" style="padding:12px 28px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;min-height:44px">Clear Cache & Reload</button></div></div>';
            return;
          }

          sessionStorage.setItem(recoveryKey, String(attempts + 1));
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            });
          }
          setTimeout(function() { location.reload(); }, 700);
        }, timeout);

        var observer = new MutationObserver(function() {
          if (isMounted()) {
            clearTimeout(timer);
            sessionStorage.removeItem('sw-recovery');
            observer.disconnect();
          }
        });

        observer.observe(document.documentElement, {
          attributes: true,
          attributeFilter: [APP_MOUNTED_ATTR]
        });
      })();
    </script>

    <!-- Android WebView/Chrome: force check for SW updates after load -->
    <script>
      if (/Android/i.test(navigator.userAgent) && 'serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.ready.then(function(reg) {
            // Force update check
            reg.update();
            // Listen for new SW and auto-activate
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'activated') {
                    // New SW activated, reload to get fresh content
                    if (document.visibilityState === 'visible') {
                      location.reload();
                    }
                  }
                });
              }
            });
          });
        });
      }
    </script>
